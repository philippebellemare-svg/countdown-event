<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Countdown Matrix</title>
<style>
  :root{
    --green:#6CFF6C;
    --green2:#00ff41;
    --bg:#020302;
    --panel:rgba(0,255,65,.08);
    --line:rgba(0,255,65,.2);
  }

  *{box-sizing:border-box}

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:var(--green2);
    font-family:Consolas, "Courier New", monospace;
  }

  #matrix{
    position:fixed;
    inset:0;
    z-index:0;
    background:#000;
  }

  .overlay{
    position:fixed;
    inset:0;
    z-index:1;
    background:
      radial-gradient(circle at center, rgba(0,255,65,.08) 0%, rgba(0,0,0,.45) 45%, rgba(0,0,0,.82) 100%);
    pointer-events:none;
  }

  .scanlines::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.04) 0px,
      rgba(255,255,255,.04) 1px,
      rgba(0,0,0,0) 3px,
      rgba(0,0,0,0) 5px
    );
    opacity:.12;
  }

  .wrap{
    position:relative;
    z-index:3;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .panel{
    width:min(1100px, 95vw);
    padding:32px 28px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(0,255,65,.08), rgba(0,255,65,.03));
    box-shadow:
      inset 0 0 40px rgba(0,255,65,.05),
      0 0 25px rgba(0,255,65,.12);
    backdrop-filter: blur(2px);
    text-align:center;
  }

  .topline{
    font-size:clamp(11px, 1vw, 14px);
    letter-spacing:.35em;
    text-transform:uppercase;
    color:#a8ffb2;
    opacity:.9;
    margin-bottom:16px;
    text-shadow:0 0 8px rgba(0,255,65,.45);
  }

  h1{
    margin:0 0 18px;
    font-size:clamp(28px, 4vw, 52px);
    letter-spacing:.3em;
    text-transform:uppercase;
    text-shadow:0 0 12px rgba(0,255,65,.7), 0 0 30px rgba(0,255,65,.2);
    animation:flicker 3s infinite;
  }

  #countdown{
    font-size:clamp(46px, 10vw, 128px);
    line-height:1;
    letter-spacing:.08em;
    text-shadow:
      0 0 8px rgba(0,255,65,.95),
      0 0 22px rgba(0,255,65,.5),
      0 0 50px rgba(0,255,65,.18);
    word-break:break-word;
  }

  .labels{
    margin-top:12px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    font-size:clamp(10px, 1vw, 14px);
    letter-spacing:.26em;
    text-transform:uppercase;
    opacity:.85;
  }

  .subtitle{
    margin-top:18px;
    font-size:clamp(13px, 1.2vw, 17px);
    color:#b8ffbf;
    letter-spacing:.16em;
  }

  .hint{
    margin-top:14px;
    font-size:12px;
    opacity:.72;
    text-transform:uppercase;
    letter-spacing:.14em;
  }

  .corners i{
    position:absolute;
    width:70px;
    height:70px;
    border-color:rgba(0,255,65,.42);
    z-index:4;
  }
  .corners .tl{top:12px;left:12px;border-top:2px solid;border-left:2px solid}
  .corners .tr{top:12px;right:12px;border-top:2px solid;border-right:2px solid}
  .corners .bl{bottom:12px;left:12px;border-bottom:2px solid;border-left:2px solid}
  .corners .br{bottom:12px;right:12px;border-bottom:2px solid;border-right:2px solid}

  .live{
    color:#d6ffd6;
    text-shadow:
      0 0 12px #fff,
      0 0 28px rgba(0,255,65,.9),
      0 0 60px rgba(0,255,65,.45);
    animation:pulse 1s infinite;
  }

  @keyframes flicker{
    0%,18%,22%,50%,54%,100%{opacity:1}
    20%,52%{opacity:.6}
  }
  @keyframes pulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.03)}
  }

  @media (max-width:700px){
    .panel{padding:24px 14px}
    .labels{gap:4px; letter-spacing:.12em}
    #countdown{letter-spacing:.03em}
  }
</style>
</head>
<body class="scanlines">
<canvas id="matrix"></canvas>
<div class="overlay"></div>

<div class="wrap">
  <div class="panel">
    <div class="corners">
      <i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i>
    </div>
    <div class="topline">system access · countdown protocol · live event</div>
    <h1>Matrix Event</h1>
    <div id="countdown">00:00:00:00</div>
    <div class="labels">
      <div>Jours</div>
      <div>Heures</div>
      <div>Minutes</div>
      <div>Secondes</div>
    </div>
    <div class="subtitle">28 mars 2026 - 21h30</div>
    <div class="hint">Clique une fois pour activer le tic-tac</div>
  </div>
</div>

<script>
const targetDate = new Date("2026-03-28T21:30:00");
let audioCtx = null;

// Tick only
function tick(){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "square";
  osc.frequency.value = 950;
  gain.gain.value = 0.045;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function updateCountdown(){
  const now = Date.now();
  const distance = targetDate - now;
  const el = document.getElementById("countdown");

  if(distance <= 0){
    el.textContent = "LIVE";
    el.classList.add("live");
    return;
  }

  const days = Math.floor(distance / (1000*60*60*24));
  const hours = Math.floor((distance / (1000*60*60)) % 24);
  const minutes = Math.floor((distance / (1000*60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  el.textContent =
    String(days).padStart(2,"0")+":"+
    String(hours).padStart(2,"0")+":"+
    String(minutes).padStart(2,"0")+":"+
    String(seconds).padStart(2,"0");

  tick();
}

setInterval(updateCountdown, 1000);
updateCountdown();

document.body.addEventListener("click", ()=>{
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.querySelector(".hint").textContent = "tic-tac activé";
  }
});

// Matrix rain background
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initDrops();
}
window.addEventListener("resize", resize);

const chars = "アァカサタナハマヤャラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$+-*/=%<>[]{}";
let fontSize = 18;
let columns = 0;
let drops = [];

function initDrops(){
  fontSize = Math.max(14, Math.min(22, Math.floor(window.innerWidth / 70)));
  columns = Math.floor(canvas.width / fontSize);
  drops = Array(columns).fill(0).map(()=>Math.random()*-100);
}

function drawMatrix(){
  ctx.fillStyle = "rgba(0, 0, 0, 0.10)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i=0; i<drops.length; i++){
    const text = chars.charAt(Math.floor(Math.random()*chars.length));
    const x = i * fontSize;
    const y = drops[i] * fontSize;

    ctx.fillStyle = "#caffca";
    ctx.fillText(text, x, y);

    ctx.fillStyle = "#00ff41";
    ctx.fillText(text, x, y + fontSize);

    if(y > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }

  requestAnimationFrame(drawMatrix);
}

resize();
drawMatrix();
</script>
</body>
</html>
