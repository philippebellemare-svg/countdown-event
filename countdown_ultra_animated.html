
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Countdown</title>

<style>
body{
margin:0;
height:100vh;
background:black;
overflow:hidden;
font-family:Courier New, monospace;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:#ff8a00;
}

.grid{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,138,0,0.15) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,138,0,0.15) 1px, transparent 1px);
background-size:40px 40px;
animation:moveGrid 10s linear infinite;
z-index:0;
}

@keyframes moveGrid{
0%{transform:translateY(0)}
100%{transform:translateY(40px)}
}

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
}

.container{
z-index:2;
text-align:center;
}

h1{
letter-spacing:12px;
font-size:3vw;
margin-bottom:20px;
text-shadow:0 0 10px #ff8a00;
}

#countdown{
font-size:9vw;
letter-spacing:1vw;
text-shadow:0 0 10px #ff8a00,0 0 40px #ff5500;
}

.subtitle{
margin-top:20px;
opacity:0.8;
}

.live{
color:red;
text-shadow:0 0 20px red,0 0 60px red;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="grid"></div>
<canvas id="particles"></canvas>

<div class="container">
<h1>EVENT INCOMING</h1>
<div id="countdown">00:00:00:00</div>
<div class="subtitle">28 mars 2026 - 21h30</div>
</div>

<script>

const targetDate = new Date("2026-03-28T21:30:00");
let audioCtx;

function tick(){
if(!audioCtx) return;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type="square";
osc.frequency.value=900;
gain.gain.value=0.05;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+0.05);
}

function update(){

const now = new Date().getTime();
const distance = targetDate - now;

if(distance<=0){
document.getElementById("countdown").innerHTML="LIVE";
document.getElementById("countdown").classList.add("live");
return;
}

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance/(1000*60*60))%24);
const minutes=Math.floor((distance/(1000*60))%60);
const seconds=Math.floor((distance/1000)%60);

document.getElementById("countdown").innerHTML =
String(days).padStart(2,"0")+":"
+String(hours).padStart(2,"0")+":"
+String(minutes).padStart(2,"0")+":"
+String(seconds).padStart(2,"0");

tick();
}

setInterval(update,1000);
update();

document.body.addEventListener("click",()=>{
if(!audioCtx){
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
});

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
v:Math.random()*0.5+0.2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,140,0,0.7)";

particles.forEach(p=>{
p.y-=p.v;
if(p.y<0) p.y=canvas.height;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
